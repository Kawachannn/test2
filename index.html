<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スイカゲーム風</title>
<style>
body {
    background: #222;
    text-align: center;
    color: white;
    font-family: sans-serif;
}

h1 {
    margin: 10px;
}

canvas {
    background: #333;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>🍉 スイカゲーム風</h1>
<p>クリックで落とす！同じ果物がくっつくと進化！</p>

<canvas id="game" width="300" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;
let fruits = [];

// 果物データ（小→大）
const types = [
    { name: "🍒", r: 10 },
    { name: "🍓", r: 15 },
    { name: "🍇", r: 20 },
    { name: "🍊", r: 25 },
    { name: "🍎", r: 30 },
    { name: "🍐", r: 35 },
    { name: "🍑", r: 40 },
    { name: "🍍", r: 45 },
    { name: "🍉", r: 50 }
];

// 果物クラス
class Fruit {
    constructor(x, y, typeIndex) {
        this.x = x;
        this.y = y;
        this.vy = 0;
        this.type = typeIndex;
        this.radius = types[typeIndex].r;
    }

    update() {
        this.vy += gravity;
        this.y += this.vy;

        // 床
        if (this.y + this.radius > canvas.height) {
            this.y = canvas.height - this.radius;
            this.vy *= -0.3;
        }
    }

    draw() {
        ctx.font = this.radius * 2 + "px serif";
        ctx.textAlign = "center";
        ctx.fillText(types[this.type].name, this.x, this.y + this.radius / 2);
    }
}

// クリックで追加
canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    fruits.push(new Fruit(x, 0, 0));
});

// 衝突＆合体
function checkCollision() {
    for (let i = 0; i < fruits.length; i++) {
        for (let j = i + 1; j < fruits.length; j++) {
            let a = fruits[i];
            let b = fruits[j];

            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < a.radius + b.radius) {
                // 同じ種類なら合体
                if (a.type === b.type && a.type < types.length - 1) {
                    fruits[i] = new Fruit(
                        (a.x + b.x) / 2,
                        (a.y + b.y) / 2,
                        a.type + 1
                    );
                    fruits.splice(j, 1);
                    return;
                }

                // ぶつかるだけ（軽く押し戻す）
                let angle = Math.atan2(dy, dx);
                let overlap = (a.radius + b.radius) - dist;

                a.x += Math.cos(angle) * overlap / 2;
                a.y += Math.sin(angle) * overlap / 2;
                b.x -= Math.cos(angle) * overlap / 2;
                b.y -= Math.sin(angle) * overlap / 2;
            }
        }
    }
}

// ループ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    fruits.forEach(f => {
        f.update();
        f.draw();
    });

    checkCollision();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
