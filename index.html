<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>演出付きガチャ</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: black;
    color: white;
    overflow-x: hidden;
}

h1 {
    margin-top: 20px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}

#result {
    margin-top: 30px;
    font-size: 30px;
}

/* 演出画面 */
#effect {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 100;
}

/* 光エフェクト */
.flash {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, white, gold, transparent);
    animation: flash 1s ease-out forwards;
}

@keyframes flash {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(5); opacity: 0; }
}

/* カード */
.card {
    padding: 20px;
    border-radius: 15px;
    font-size: 28px;
    margin-top: 20px;
    animation: pop 0.5s ease;
}

.N { background: gray; }
.R { background: blue; }
.SR { background: purple; }
.SSR { background: gold; color: black; }

@keyframes pop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}
</style>
</head>
<body>

<h1>🎰 演出付きガチャ</h1>
<button onclick="startGacha()">ガチャを引く！</button>

<div id="result"></div>

<!-- 演出 -->
<div id="effect"></div>

<script>
const characters = [
    { name: "スライム", rarity: "N", rate: 50 },
    { name: "ゴブリン", rarity: "N", rate: 30 },
    { name: "ナイト", rarity: "R", rate: 10 },
    { name: "ドラゴン", rarity: "SR", rate: 7 },
    { name: "神龍", rarity: "SSR", rate: 3 }
];

function drawGacha() {
    let rand = Math.random() * 100;
    let sum = 0;
    for (let c of characters) {
        sum += c.rate;
        if (rand <= sum) return c;
    }
}

function startGacha() {
    const effect = document.getElementById("effect");
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "";
    effect.style.display = "flex";

    // ステップ① 暗転
    effect.innerHTML = "<h2>通信中...</h2>";

    setTimeout(() => {
        // ステップ② 光演出
        effect.innerHTML = '<div class="flash"></div>';
    }, 1000);

    setTimeout(() => {
        // ステップ③ 結果
        const result = drawGacha();

        effect.innerHTML = `
            <div class="card ${result.rarity}">
                ${result.rarity}<br>${result.name}
            </div>
        `;

        // SSRなら特別メッセージ
        if (result.rarity === "SSR") {
            effect.innerHTML += "<h2>✨激レア！！✨</h2>";
        }

    }, 2000);

    setTimeout(() => {
        // ステップ④ 通常画面に戻る
        effect.style.display = "none";
    }, 3500);
}
</script>

</body>
</html>
